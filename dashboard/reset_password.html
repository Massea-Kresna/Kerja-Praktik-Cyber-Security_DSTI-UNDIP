<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - UNDIP Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body style="background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;">

    <div class="auth-card" style="width: 100%; max-width: 400px; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); padding: 32px;">
        <div class="auth-header" style="text-align: center; margin-bottom: 24px;">
            <img src="assets/csirt-logo.png" alt="UNDIP CSIRT Logo" style="width: 100%; max-width: 240px; height: auto; display: block; margin: 0 auto 16px;">
            <h2 style="color: #0f172a; margin: 0 0 8px 0; font-size: 20px;">Buat Password Baru</h2>
            <p style="color: #64748b; margin: 0; font-size: 14px;">Silakan masukkan kata sandi baru Anda.</p>
        </div>

        <div id="resetErrorMsg" style="display: none; background: #fee2e2; color: #ef4444; padding: 12px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; text-align: center;"></div>
        <div id="resetSuccessMsg" style="display: none; background: #dcfce7; color: #10b981; padding: 12px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; text-align: center; font-weight: 500;"></div>

        <form id="resetForm" onsubmit="submitNewPassword(event)">
            <div style="margin-bottom: 16px;">
                <label for="newPassword" style="display: block; font-size: 13px; font-weight: 500; color: #334155; margin-bottom: 6px;">Password Baru</label>
                <input type="password" id="newPassword" style="width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; box-sizing: border-box;" placeholder="Masukkan password baru" required>
            </div>
            <div style="margin-bottom: 24px;">
                <label for="confirmPassword" style="display: block; font-size: 13px; font-weight: 500; color: #334155; margin-bottom: 6px;">Konfirmasi Password</label>
                <input type="password" id="confirmPassword" style="width: 100%; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; box-sizing: border-box;" placeholder="Ulangi password baru" required>
            </div>
            <button type="submit" id="resetSubmitBtn" style="width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-weight: 600; font-size: 14px; cursor: pointer; transition: background 0.2s;">Simpan Password</button>
        </form>
        
        <div style="text-align: center; margin-top: 24px; display: none;" id="backToLoginContainer">
            <a href="index.html" style="color: #2563eb; font-size: 14px; font-weight: 500; text-decoration: none;">&larr; Pergi ke Halaman Login</a>
        </div>
    </div>

    <script>
        const API_BASE = "http://" + window.location.hostname + ":8000";

        async function submitNewPassword(e) {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errMsg = document.getElementById('resetErrorMsg');
            const successMsg = document.getElementById('resetSuccessMsg');
            const btn = document.getElementById('resetSubmitBtn');
            const form = document.getElementById('resetForm');

            errMsg.style.display = 'none';

            if (newPassword !== confirmPassword) {
                errMsg.textContent = "Konfirmasi password tidak sesuai!";
                errMsg.style.display = 'block';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                errMsg.textContent = "Tautan tidak valid atau token tidak ditemukan.";
                errMsg.style.display = 'block';
                return;
            }

            btn.textContent = 'Menyimpan...';
            btn.disabled = true;
            btn.style.opacity = '0.7';

            try {
                const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPassword })
                });
                
                const data = await response.json();

                if (response.ok) {
                    form.style.display = 'none';
                    successMsg.textContent = "Kata sandi Anda berhasil diperbarui!";
                    successMsg.style.display = 'block';
                    document.getElementById('backToLoginContainer').style.display = 'block';
                } else {
                    errMsg.textContent = data.detail || "Gagal mereset password.";
                    errMsg.style.display = 'block';
                }
            } catch (err) {
                errMsg.textContent = "Koneksi ke server gagal.";
                errMsg.style.display = 'block';
            } finally {
                btn.textContent = 'Simpan Password';
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
